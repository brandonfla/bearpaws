name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  schema-validator:
    name: schema-validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: tests/schema-validator/run-validator.sh

  token-measurement:
    name: token-measurement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: tests/token-measurement/measure.sh
